on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
    contents: write
    packages: write

jobs:
  release-windows:
    name: Release Windows Binaries
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup msys2
      uses: msys2/setup-msys2@v2
      with:
        msystem: mingw64
        path-type: strict
        install: git mingw-w64-x86_64-gcc make mingw-w64-x86_64-pkgconf diffutils yasm mingw-w64-x86_64-libx264
    - name: Toolchain info
      run: |
        echo "MSYSTEM = $MSYSTEM"
        echo "gcc = $(which gcc)"
        echo "pkg-config = $(which pkg-config)"
        echo "libx264 pkg-config flags = $(pkg-config --cflags --libs x264)"
    - name: Clone ffmpeg
      run: git clone https://git.ffmpeg.org/ffmpeg.git
    - name: "ffmpeg: Checkout compatible version"
      run: git checkout e9107d16f3ea1eff48f0bfdcaff49f7c32a20919
      working-directory: ffmpeg
    - name: "ffmpeg: Apply assembler fix"
      run: git cherry-pick --no-commit effadce6c756247ea8bae32dc13bb3e6f464f0eb
      working-directory: ffmpeg
    - name: "ffmpeg: Apply bink2 decoder patch"
      run: git apply ../bink2.patch
      working-directory: ffmpeg
    - name: "ffmpeg: Fix some vulkan error (IDK how exactly this issue happened or what it means, but the fix works)"
      run: git apply ../fix-hwcontext_vulkan.patch
      working-directory: ffmpeg
    - name: Build ffmpeg
      run: |
        ./configure --enable-gpl --enable-version3 --enable-libx264
        make -j8
      working-directory: ffmpeg
    - name: Upload release files
      uses: softprops/action-gh-release@v2.2.2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          ffmpeg/ffmpeg.exe
          ffmpeg/ffplay.exe
          ffmpeg/ffprobe.exe